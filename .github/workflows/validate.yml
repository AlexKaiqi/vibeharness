name: Validate

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run validation
        run: make validate
      - name: Check package CLI
        run: |
          python -m pip install -e .
          vh validate
