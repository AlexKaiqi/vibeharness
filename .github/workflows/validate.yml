name: Validate

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run validation
        run: make validate
      - name: Check installed package CLI
        run: |
          python -m pip install .
          vh validate
          target="$(mktemp -d)/target"
          vh init "$target"
          test -f "$target/AGENTS.md"
          test -f "$target/CLAUDE.md"
          test -f "$target/.vibeharness/config.json"
          test -f "$target/.vibeharness/templates/scorecard.json"
          test ! -f "$target/.vibeharness/i18n.json"
          test -f "$target/.claude/settings.example.json"
          test -f "$target/.cursor/rules/vibeharness.mdc"
          test -f "$target/.openhands/microagents/vibeharness.md"
          test ! -d "$target/.vibeharness/episodes"
          cd "$target"
          vh start --request "smoke episode"
          test -n "$(find .vibeharness/episodes -name manifest.json -print -quit)"
